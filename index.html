<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>matteblackmedia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a09;
      --fg: #f0ede8;
      --muted: #5a5a52;
      --border: rgba(240, 237, 232, 0.08);
    }

    html, body { height: 100%; background: var(--bg); color: var(--fg); overflow-x: hidden; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 40px 110px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .wordmark-row {
      display: flex;
      align-items: center;
      gap: clamp(16px, 2.5vw, 36px);
      animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 13vw, 140px);
      line-height: 0.88;
      letter-spacing: -0.01em;
      color: var(--fg);
      text-shadow: 2px 2px 0px rgba(0,0,0,0.8), 4px 4px 0px rgba(0,0,0,0.4);
      user-select: none;
      display: flex;
      flex-direction: column;
    }

    .wordmark .line1 { display: block; }
    .wordmark .line2 {
      display: block;
      padding-left: clamp(4px, 0.8vw, 10px);
      color: transparent;
      -webkit-text-stroke: 1.5px var(--fg);
    }

    .logo-placeholder {
      height: clamp(110px, 22vw, 240px);
      aspect-ratio: 1;
      border: 1.5px solid rgba(240, 237, 232, 0.18);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .logo-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(240,237,232,0.03) 0%, transparent 60%);
    }

    .logo-placeholder svg { width: 48%; height: 48%; opacity: 0.2; }

    .logo-label {
      position: absolute;
      bottom: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.52rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--muted);
      margin: 32px 0 28px;
      animation: revealUp 0.8s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .tagline {
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      font-size: clamp(1.3rem, 3vw, 2rem);
      color: rgba(240, 237, 232, 0.5);
      line-height: 1.6;
      letter-spacing: 0.01em;
      max-width: 820px;
      animation: revealUp 0.8s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .tagline .w {
      display: inline-block;
      cursor: default;
      transition: color 0.18s ease, transform 0.22s cubic-bezier(0.16, 1, 0.3, 1), text-shadow 0.18s ease;
      white-space: pre;
    }

    .tagline .w:hover {
      color: var(--fg);
      transform: scale(1.12);
      text-shadow: 0 0 28px rgba(240, 237, 232, 0.25);
    }

    .tagline .slash { display: inline-block; color: var(--muted); margin: 0 2px; }

    /* ── Hot rainbow letters ── */
    .hot {
      display: inline-flex;
      align-items: baseline;
      position: relative;
    }

    .hot-letter {
      display: inline-block;
      font-weight: 700;
      animation:
        wave-letter 2.2s ease-in-out infinite,
        hue-spin    2.4s linear     infinite;
      will-change: transform, color;
    }

    @keyframes wave-letter {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-3px); }
    }

    @keyframes hue-spin {
      0%   { color: hsl(0,   100%, 65%); }
      14%  { color: hsl(50,  100%, 60%); }
      28%  { color: hsl(105, 90%,  55%); }
      42%  { color: hsl(175, 95%,  52%); }
      57%  { color: hsl(225, 95%,  68%); }
      71%  { color: hsl(280, 90%,  65%); }
      85%  { color: hsl(330, 95%,  62%); }
      100% { color: hsl(360, 100%, 65%); }
    }

    /* ── Contact ── */
    .contact-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 48px;
      margin-bottom: 18px;
      animation: revealUp 0.8s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .links {
      display: flex;
      align-items: center;
      width: 100%;
      animation: revealUp 0.8s 0.44s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .link-row { display: flex; align-items: center; gap: 10px; flex: 1; }

    .link-row + .link-row { border-left: 1px solid var(--border); padding-left: clamp(16px, 3vw, 36px); }
    .link-row:not(:last-child) { padding-right: clamp(16px, 3vw, 36px); }

    .link-icon { width: 20px; height: 20px; flex-shrink: 0; opacity: 0.35; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }
    .link-icon svg { width: 18px; height: 18px; fill: var(--fg); }

    .links a {
      font-family: 'Barlow', sans-serif;
      font-weight: 400;
      font-size: clamp(1rem, 2.2vw, 1.5rem);
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      position: relative;
      transition: color 0.2s, transform 0.2s cubic-bezier(0.16,1,0.3,1);
      line-height: 1;
    }

    .links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: var(--fg);
      transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .link-row:hover .link-icon { opacity: 1; }
    .link-row:hover a { color: var(--fg); transform: translateY(-1px); }
    .link-row:hover a::after { width: 100%; }

    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      animation: revealUp 0.8s 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    footer span {
      font-family: 'DM Mono', monospace;
      font-size: 0.67rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .corner-mark {
      position: fixed;
      top: 36px; right: 40px;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      opacity: 0.4;
      animation: revealUp 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes revealUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 560px) {
      main { padding: 48px 24px 110px; }
      footer { padding: 16px 24px; }
      .corner-mark { display: none; }
      .wordmark .line2 { -webkit-text-stroke: 1px var(--fg); }
      .links { flex-direction: column; align-items: flex-start; gap: 16px; }
      .link-row + .link-row { border-left: none; padding-left: 0; border-top: 1px solid var(--border); padding-top: 16px; }
      .link-row:not(:last-child) { padding-right: 0; }
    }
  </style>
</head>
<body>

<span class="corner-mark">north america · est. 2026</span>

<main>
  <div class="wordmark-row">
    <h1 class="wordmark">
      <span class="line1">matte</span>
      <span class="line2">black media</span>
    </h1>
    <img src="logo.png" alt="matteblackmedia"
      style="height: clamp(110px, 22vw, 240px); width: auto; display: block;" />
  </div>

  <div class="divider"></div>

  <!-- [HOT] markers get replaced by JS -->
  <p class="tagline" id="tagline">Helping personal brands and content creators scale past [HOT]6 figures / month in profit.[/HOT]</p>

  <p class="contact-label">Contact</p>

  <nav class="links">
    <div class="link-row">
      <span class="link-icon"><svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg></span>
      <a href="#" target="_blank">YouTube</a>
    </div>
    <div class="link-row">
      <span class="link-icon"><svg viewBox="0 0 24 24"><path d="M12 2.2c3.2 0 3.6 0 4.9.1 3.3.1 4.8 1.7 4.9 4.9.1 1.3.1 1.6.1 4.8 0 3.2 0 3.6-.1 4.8-.1 3.2-1.7 4.8-4.9 4.9-1.3.1-1.6.1-4.9.1-3.2 0-3.6 0-4.8-.1-3.3-.1-4.8-1.7-4.9-4.9C2.2 15.6 2.2 15.2 2.2 12c0-3.2 0-3.6.1-4.8C2.4 3.9 4 2.3 7.2 2.3c1.2-.1 1.6-.1 4.8-.1zM12 0C8.7 0 8.3 0 7.1.1 2.7.3.3 2.7.1 7.1 0 8.3 0 8.7 0 12c0 3.3 0 3.7.1 4.9.2 4.4 2.6 6.8 7 7C8.3 24 8.7 24 12 24c3.3 0 3.7 0 4.9-.1 4.4-.2 6.8-2.6 7-7 .1-1.2.1-1.6.1-4.9 0-3.3 0-3.7-.1-4.9C23.7 2.7 21.3.3 16.9.1 15.7 0 15.3 0 12 0zm0 5.8a6.2 6.2 0 1 0 0 12.4A6.2 6.2 0 0 0 12 5.8zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.4-11.8a1.44 1.44 0 1 0 0 2.88 1.44 1.44 0 0 0 0-2.88z"/></svg></span>
      <a href="https://instagram.com/matteblack_media" target="_blank">Instagram</a>
    </div>
    <div class="link-row">
      <span class="link-icon"><svg viewBox="0 0 24 24"><path d="M19.6 3.3A4.9 4.9 0 0 1 14.8 0h-3.6v16.4a2.9 2.9 0 0 1-2.9 2.5 2.9 2.9 0 0 1-2.9-2.9 2.9 2.9 0 0 1 2.9-2.9c.3 0 .5 0 .8.1V9.5a6.5 6.5 0 0 0-.8-.1A6.5 6.5 0 0 0 1.8 16a6.5 6.5 0 0 0 6.5 6.5A6.5 6.5 0 0 0 14.8 16V8.2a8.4 8.4 0 0 0 4.9 1.6V6.2a4.9 4.9 0 0 1-3.1-2.9h3.1z"/></svg></span>
      <a href="https://tiktok.com/@matteblackmedia_" target="_blank">TikTok</a>
    </div>
    <div class="link-row">
      <span class="link-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg></span>
      <a href="mailto:matteblackinquiry@gmail.com">Email</a>
    </div>
  </nav>
</main>

<footer>
  <span id="footerTime"></span>
  <span>© 2026 matteblackmedia</span>
</footer>

<script>
// ── Build tagline ──
const tagEl = document.getElementById('tagline');
const raw = tagEl.textContent;
const parts = raw.split(/(\[HOT\].*?\[\/HOT\])/);
let html = '';

parts.forEach(part => {
  const m = part.match(/\[HOT\](.*?)\[\/HOT\]/);
  if (m) {
    const letters = m[1].split('');
    const total = letters.length;
    const spans = letters.map((ch, i) => {
      const wd = (i / total * 2.2).toFixed(2);
      const hd = -(i / total * 2.4).toFixed(2);
      const c = ch === ' ' ? '&nbsp;' : ch;
      return `<span class="hot-letter" style="animation-delay:${wd}s,${hd}s">${c}</span>`;
    }).join('');
    html += `<span class="hot" id="hotSpan">${spans}</span>`;
  } else {
    part.split(' ').forEach(word => {
      if (!word) return;
      if (word === '/') {
        html += `<span class="slash">/ </span>`;
      } else {
        html += `<span class="w">${word} </span>`;
      }
    });
  }
});
tagEl.innerHTML = html;

// ── Footer clock ──
const timeEl = document.getElementById('footerTime');
function tick() {
  const n = new Date();
  timeEl.textContent = [n.getHours(),n.getMinutes(),n.getSeconds()]
    .map(v => v.toString().padStart(2,'0')).join(':') + ' mst';
}
tick();
setInterval(tick, 1000);
</script>

</body>
</html>
